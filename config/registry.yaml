# Device and metric registry for Rotor Meteo
# Topic convention: rotor/meteo/<device_id>/<metric_id>

devices:
  bme280_local:
    name: BME280 Local
    location: enclosure
    metrics: [temp_c, rh_pct, pressure_hpa]
  bme280_ground:
    name: BME280 Suelo Sombra
    location: ground shade
    metrics: [temp_ground_c, rh_ground_pct]
  rain_gauge_1:
    name: Rain Gauge 1
    location: roof
    metrics: [rain_mm]
  rain_node_mcu:
    name: Rain NodeMCU
    location: roof
    metrics: [rain_tips_total, rain_mm_total, rain_mm_interval, rain_rate_mmh, rain_last_tip_ms, rain_since_last_tip_ms]
  pm_sensor_1:
    name: PM Sensor 1
    location: outdoors
    metrics: [pm10_ugm3, pm2_5_ugm3]
  sensor_community_1:
    name: Sensor.Community 8283515
    location: outdoors
    metrics: [pm10_ugm3, pm2_5_ugm3, temp_c, rh_pct, pressure_hpa]
  gps_usb_1:
    name: GPS USB
    location: enclosure
    metrics: [gps_lat, gps_lon, gps_alt]
  wind_1:
    name: Wind Sensor (planned)
    location: mast
    metrics: [wind_dir_deg, wind_speed_ms]
  wind_esp8266:
    name: Wind ESP8266
    location: mast
    metrics:
      - wind_speed_ms
      - wind_speed_raw
      - wind_speed_ma
      - wind_direction_deg
      - wind_direction_raw
      - wind_direction_ma
      - wind_direction_cardinal
      - wind_raw
      - wind_voltage_v
      - wind_current_ma
  light_mcu:
    name: Light MCU
    location: mast
    metrics:
      - light_lux
      - uv_raw
      - uv_voltage_v

metrics:
  temp_c:
    name: Temperature
    unit: C
  rh_pct:
    name: Relative Humidity
    unit: pct
  pressure_hpa:
    name: Pressure
    unit: hPa
  temp_ground_c:
    name: Temperatura suelo (sombra)
    unit: C
  rh_ground_pct:
    name: Humedad suelo (sombra)
    unit: pct
  rain_mm:
    name: Rainfall
    unit: mm
  rain_tips_total:
    name: Rain Tips Total
    unit: count
  rain_mm_total:
    name: Rainfall Total
    unit: mm
  rain_mm_interval:
    name: Rainfall Interval
    unit: mm
  rain_rate_mmh:
    name: Rain Rate
    unit: mm/h
  rain_last_tip_ms:
    name: Last Tip
    unit: ms
  rain_since_last_tip_ms:
    name: Since Last Tip
    unit: ms
  pm10_ugm3:
    name: PM10
    unit: ug/m3
  pm2_5_ugm3:
    name: PM2.5
    unit: ug/m3
  gps_lat:
    name: GPS Latitude
    unit: deg
  gps_lon:
    name: GPS Longitude
    unit: deg
  gps_alt:
    name: GPS Altitude
    unit: m
  wind_dir_deg:
    name: Wind Direction
    unit: deg
  wind_speed_ms:
    name: Wind Speed
    unit: m/s
  wind_raw:
    name: Wind Raw
    unit: adc
  wind_voltage_v:
    name: Wind Voltage
    unit: V
  wind_current_ma:
    name: Wind Current
    unit: mA
  wind_speed_raw:
    name: Wind Speed Raw
    unit: adc
  wind_speed_ma:
    name: Wind Speed Current
    unit: mA
  wind_direction_deg:
    name: Wind Direction
    unit: deg
  wind_direction_raw:
    name: Wind Direction Raw
    unit: adc
  wind_direction_ma:
    name: Wind Direction Current
    unit: mA
  wind_direction_cardinal:
    name: Wind Direction (Cardinal)
    unit: text
  light_lux:
    name: Luminosidad
    unit: lux
  uv_raw:
    name: UV Raw
    unit: adc
  uv_voltage_v:
    name: Voltaje UV
    unit: V
