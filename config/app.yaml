site_name: Rotor Studio Meteo
mqtt:
  host: 127.0.0.1
  port: 1883
  topic_prefix: rotor/meteo
storage:
  sqlite_path: /opt/rotor-meteo/data/rotor.db
web:
  host: 0.0.0.0
  port: 8000
  sse_interval_sec: 1.0
camera:
  host: 192.168.50.10
  rtsp_path: /Streaming/Channels/101
  username: admin
  hls_dir: /opt/rotor-meteo/data/hls
gps:
  enabled: true
  device: /dev/ttyACM0
  baud: 9600
  device_id: gps_usb_1
  min_interval_sec: 1.0
sensor_community:
  enabled: true
  url: http://192.168.1.110/data.json
  interval_sec: 60
  device_id: sensor_community_1
cloud_bridge:
  enabled: false
  endpoint: https://www.rotor-studio.net/nubemovil/cloud_ingest.php
  token: ""
  interval_sec: 12
  timeout_sec: 8
  title: NUBEMOVIL
  subtitle: NUBEMOVIL en directo
  frame_path: /opt/rotor-meteo/data/hls/latest.jpg
  include_frame: true
  metrics:
    - source: wind_esp8266/wind_direction_deg
      label: Direccion
      decimals: 0
      unit: deg
    - source: wind_esp8266/wind_speed_ms
      label: Velocidad
      decimals: 1
      unit: m/s
    - source: light_mcu/light_lux
      label: Luminosidad
      decimals: 0
      unit: lux
    - source: light_mcu/uv_voltage_v
      label: Radiacion UV
      decimals: 2
      unit: V
    - source: rain_node_mcu/rain_mm_total
      label: Lluvia
      decimals: 1
      unit: mm
    - source: sensor_community_1/pressure_hpa
      label: Presion
      decimals: 1
      unit: hPa
    - source: sensor_community_1/temp_c
      label: Temp
      decimals: 1
      unit: C
    - source: sensor_community_1/rh_pct
      label: Humedad
      decimals: 0
      unit: "%"
    - source: bme280_ground/temp_ground_c
      label: Temp suelo
      decimals: 1
      unit: C
    - source: bme280_ground/rh_ground_pct
      label: Hum suelo
      decimals: 0
      unit: "%"
    - source: sensor_community_1/pm2_5_ugm3
      label: PM2.5
      decimals: 1
      unit: ug/m3
    - source: sensor_community_1/pm10_ugm3
      label: PM10
      decimals: 1
      unit: ug/m3
    - source: pi_health/temperature_c
      label: TEMP PI
      decimals: 1
      unit: C
vapor:
  enabled: false
  base_url: ""
  token: ""
  request_timeout_sec: 4
  poll_interval_sec: 5
fan:
  enabled: false
  base_url: ""
  token: ""
  request_timeout_sec: 4
  poll_interval_sec: 5
