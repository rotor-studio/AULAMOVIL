site_name: Rotor Studio Meteo
mqtt:
  host: 127.0.0.1
  port: 1883
  topic_prefix: rotor/meteo
storage:
  sqlite_path: /opt/rotor-meteo/data/rotor.db
web:
  host: 0.0.0.0
  port: 8000
  sse_interval_sec: 1.0
camera:
  host: 192.168.50.10
  rtsp_path: /Streaming/Channels/101
  username: admin
  hls_dir: /opt/rotor-meteo/data/hls
gps:
  enabled: true
  device: /dev/ttyACM0
  baud: 9600
  device_id: gps_usb_1
  min_interval_sec: 1.0
sensor_community:
  enabled: true
  url: http://192.168.0.171/data.json
  interval_sec: 60
  device_id: sensor_community_1
cloud_bridge:
  enabled: false
  endpoint: http://127.0.0.1:18080/api/ingest.php
  token: ""
  interval_sec: 12
  timeout_sec: 8
  title: MOVIL CLOUD
  subtitle: Aula Movil en directo
  frame_path: /opt/rotor-meteo/data/hls/latest.jpg
  include_frame: true
  metrics:
    - source: sensor_community_1/temp_c
      label: Temperatura
      decimals: 1
      unit: C
    - source: sensor_community_1/rh_pct
      label: Humedad
      decimals: 0
      unit: "%"
    - source: sensor_community_1/pressure_hpa
      label: Presion
      decimals: 0
      unit: hPa
    - source: wind_esp8266/wind_speed_ms
      label: Viento
      decimals: 1
      unit: m/s
    - source: rain_node_mcu/rain_mm_total
      label: Lluvia
      decimals: 1
      unit: mm
    - source: light_mcu/light_lux
      label: Luz
      decimals: 0
      unit: lux
